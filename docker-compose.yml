services:
  mongodb:
    image: mongo:8
    container_name: tp-web-fullstack
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: tp3
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
